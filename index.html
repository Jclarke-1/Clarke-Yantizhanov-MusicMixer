<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Mixer</title>
    <link href="css/grid.css" rel="stylesheet" type="text/css">
    <link href="css/main.css" rel="stylesheet" type="text/css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grid-con" id="headings">
        <div class="headings col-start-2 col-end-4 m-col-start-4 m-col-end-10">
            <h1>SEAL SOUND MIXER</h1>
        </div>
        <div class="headings col-start-2 col-end-4 m-col-start-2 m-col-end-12">
            <h2>DROP THE SEAL SPECIES TO HEAR THEIR BARKS</h2>
        </div>
   </div>
    <main class="container">
        <section class="grid-con">
            <h2 class="hidden">drop zones</h2>
             <div class="zones target-zone col-span-2 m-col-span-4" id="top-left"></div>
             <div class="zones target-zone col-span-2 m-col-span-4" id="top-middle"></div>
             <div class="zones target-zone col-span-2 m-col-span-4" id="top-right"></div>
             <div class="zones target-zone col-span-2 m-col-span-4" id="bottom-left"></div>
             <div class="zones target-zone col-span-2 m-col-span-4" id="bottom-middle"></div>
             <div class="zones target-zone col-span-2 m-col-span-4" id="bottom-right"></div>
        </section>

        <button class="reset-btn" id="reset-btn">Reset Puzzle</button>


        <section class="seals-container">
            <h2 class="hidden">Drag these seals into the dropzone to hear them speak!</h2>
            <div id="seal-box" class="sealboxes grid-con">

                <div class="seal col-span-2 m-col-span-3" draggable="true">
                    <img src="images/baikal-seal.png" alt="baikal seal" data-trackseal="baikal-seal">
                    <audio src="audio/baikal-seal.wav" class="seal-audio"></audio>
                </div>

                <div class="seal col-span-2 m-col-span-3" draggable="true">
                    <img src="images/elephant-seal.png" alt="elephant seal" data-trackseal="elephant-seal">
                    <audio src="audio/elephant-seal.wav" class="seal-audio"></audio>
                </div>

                <div class="seal col-span-2 m-col-span-3" draggable="true">
                    <img src="images/grey-seal.png" alt="grey seal" data-trackseal="gray-seal">
                    <audio src="audio/gray-seal.wav" class="seal-audio"></audio>
                </div>

                <div class="seal col-span-2 m-col-span-3" draggable="true">
                    <img src="images/harbour-seal.png" alt="harbour seal" data-trackseal="harbor-seal">
                    <audio src="audio/harbor-seal.wav" class="seal-audio"></audio>
                </div>

                <div class="seal col-span-2  m-col-start-4 m-col-end-7" draggable="true">
                    <img src="images/ribbon-seal.png" alt="ribbon seal" data-trackseal="ribbon_seal">
                    <audio src="audio/ribbon_seal.wav" class="seal-audio"></audio>
                </div>

                <div class="seal col-span-2 m-col-start-7 m-col-end-10" draggable="true">
                    <img src="images/sea-lion.png" alt="sea lion" data-trackseal="sea-lion">
                     <audio src="audio/sea-lion.wav" class="seal-audio"></audio>
                </div>

            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
