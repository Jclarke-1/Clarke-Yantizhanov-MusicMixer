<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Mixer</title>
    <link href="css/grid.css" rel="stylesheet" type="text/css">
    <link href="css/main.css" rel="stylesheet" type="text/css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grid-con" id="headings">
        <div class="headings m-col-start-4 m-col-end-10">
            <h1>SEAL SOUND MIXER</h1>
        </div>
        <div class="headings m-col-start-2 m-col-end-12">
            <h2>DROP THE SEAL SPECIES TO HEAR THEIR BARKS</h2>
        </div>
   </div>
    <main class="container">
        <section class="dropzones">
             <div class="zones target-zone" id="top-left"></div>
             <div class="zones target-zone" id="top-middle"></div>
             <div class="zones target-zone" id="top-right"></div>
             <div class="zones target-zone" id="bottom-left"></div>
             <div class="zones target-zone" id="bottom-middle"></div>
             <div class="zones target-zone" id="bottom-right"></div>
        </section>

        <section class="seals-container">
            <h2 class="hidden">Drag these seals into the dropzone to hear them speak!</h2>
            <div id="seal-box" class="sealboxes">
                <div class="seal" draggable="true"><img src="images/baikal-seal.png" alt="baikal seal"></div>
                <div class="seal" draggable="true"><img src="images/elephant-seal.png" alt="elephant seal" ></div>
                <div class="seal" draggable="true"><img src="images/grey-seal.png" alt="grey seal" ></div>
                <div class="seal" draggable="true"><img src="images/harbour-seal.png" alt="harbour seal" ></div>
                <div class="seal" draggable="true"><img src="images/ribbon-seal.png" alt="ribbon seal" ></div>
                <div class="seal" draggable="true"><img src="images/sea-lion.png" alt="sea lion" ></div>
            </div>
            <button class="reset-btn" id="reset-btn">Reset Puzzle</button>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
