<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Mixer</title>
    <link href="css/grid.css" rel="stylesheet" type="text/css">
    <link href="css/main.css" rel="stylesheet" type="text/css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grid-con" id="headings">
        <div class="headings col-start-2 col-end-4 m-col-start-4 m-col-end-10">
            <h1>SEAL SOUND MIXER</h1>
        </div>
        <div class="headings col-start-2 col-end-4 m-col-start-2 m-col-end-12">
            <h2>DROP THE SEAL SPECIES TO HEAR THEIR BARKS</h2>
        </div>
   </div>
    <main class="container">
        <section class="grid-con">
            <h2 class="hidden">drop zones</h2>
             <div class="zones target-zone col-span-2 m-col-span-4" id="top-left"></div>
             <div class="zones target-zone col-span-2 m-col-span-4" id="top-middle"></div>
             <div class="zones target-zone col-span-2 m-col-span-4" id="top-right"></div>
             <div class="zones target-zone col-span-2 m-col-span-4" id="bottom-left"></div>
             <div class="zones target-zone col-span-2 m-col-span-4" id="bottom-middle"></div>
             <div class="zones target-zone col-span-2 m-col-span-4" id="bottom-right"></div>
        </section>

         <section class="audio-controls">
      <h2 class="hidden">Audio Controls</h2>
      <button id="playButton">PLAY</button>
      <button id="pauseButton">PAUSE</button>
      <button class="reset-btn" id="reset-btn">Reset</button>
      <input id="volumeControl" type="range" min="0" max="100" step="1">

    </section>
        
        <section class="seals-container">
            <h2 class="hidden">Drag these seals into the dropzone to hear them speak!</h2>
            <div id="seal-box" class="sealboxes grid-con">

                <div class="seal col-span-2 m-col-span-3" draggable="true" data-species="baikal">
                    <img src="images/baikal-seal.png" alt="baikal seal"  data-species="baikal">
                </div>

                <div class="seal col-span-2 m-col-span-3" draggable="true" data-species="elephant">
                    <img src="images/elephant-seal.png" alt="elephant seal" data-species="elephant">
                </div>

                <div class="seal col-span-2 m-col-span-3" draggable="true" data-species="gray">
                    <img src="images/grey-seal.png" alt="grey seal" data-species="gray">
                </div>

                <div class="seal col-span-2 m-col-span-3" draggable="true" data-species="harbor">
                    <img src="images/harbour-seal.png" alt="harbour seal" data-species="harbor">
                </div>

                <div class="seal col-span-2  m-col-start-4 m-col-end-7" draggable="true" data-species="ribbon">
                    <img src="images/ribbon-seal.png" alt="ribbon seal" data-species="ribbon">
                </div>
                <div class="seal col-span-2 m-col-start-7 m-col-end-10" draggable="true" data-species="lion">
                    <img src="images/sea-lion.png" alt="sea lion" data-species="lion">
                </div>
                
            </div>

            <div id="audios"></div>

            <audio id="baikal" src="audio/baikal-seal.wav"></audio>
            <audio  id="elephant" src="audio/elephant-seal.wav"></audio>
            <audio id="gray" src="audio/gray-seal.wav"></audio>
            <audio id="harbor" src="audio/harbor-seal.wav"></audio>
            <audio id="ribbon" src="audio/ribbon_seal.wav"></audio>
            <audio id="lion" src="audio/sea-lion.wav"></audio>

        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
